<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shhh… this site is napping — Purrductivity</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #3a2f2a;
      background: linear-gradient(180deg, #1f2447 0%, #3a3a6a 45%, #6b5a8a 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* soft moon + stars backdrop */
    .moon {
      position: fixed; top: 36px; right: 48px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #fdf6d8; box-shadow: 0 0 40px rgba(253,246,216,.55);
      z-index: 1;
    }
    .moon::after {
      content: ""; position: absolute; top: 6px; left: 14px;
      width: 44px; height: 44px; border-radius: 50%;
      background: #1f2447; box-shadow: 0 0 40px rgba(253,246,216,.0);
    }
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 22%, #fff 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 28% 12%, #fff 50%, transparent 51%),
        radial-gradient(2px 2px at 46% 28%, #fff 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 64% 16%, #fff 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 82% 30%, #fff 50%, transparent 51%),
        radial-gradient(2px 2px at 90% 12%, #fff 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 20% 40%, #fff 50%, transparent 51%);
      animation: twinkle 4s ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

    main {
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      padding: 28px 36px 34px;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(10,12,30,.4);
      max-width: 460px;
      z-index: 2;
    }
    h1 { margin: 14px 0 6px; font-size: 24px; color: #2c2440; }
    p { color: #6a5f6a; margin: 6px 0; }
    .from {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      background: #efe7fb; color: #6a3aa0;
      border-radius: 999px; font-size: 13px;
      max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .countdown {
      margin-top: 14px;
      font-family: "Courier New", monospace;
      font-size: 18px;
      color: #4a3a66;
    }
    .actions {
      margin-top: 18px;
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    button {
      padding: 10px 16px;
      border-radius: 12px;
      font: inherit;
      cursor: pointer;
    }
    .btn-stop {
      border: 0; background: #f0934a; color: #fff; font-weight: 600;
    }
    .btn-stop:hover { background: #e07c2e; }
    .btn-stop:disabled { opacity: .6; cursor: default; }
    .btn-ghost {
      border: 1px solid #e6def5; background: #f6f1fe; color: #4a3a66;
    }
    .btn-ghost:hover { background: #ece2fb; }
    .note {
      margin-top: 12px; min-height: 18px;
      font-size: 13px; color: #a0456a;
    }

    .cat-stage {
      height: 180px;            /* reserve space so layout doesn't jump */
      display: flex; align-items: center; justify-content: center;
    }
    .cat-img {
      width: 180px; height: 180px;
      object-fit: contain;
      image-rendering: pixelated; /* keep crisp if it's pixel art */
      display: block;
    }
    /* runs off from its spot, out past the edge of the screen */
    .cat-img.runoff {
      animation: runoff 1.6s cubic-bezier(.45,.05,.6,1) forwards;
      will-change: transform, opacity;
    }
    @keyframes runoff {
      0%   { transform: translateX(0);     opacity: 1; }
      10%  { transform: translateX(-16px); opacity: 1; }  /* little crouch */
      88%  { opacity: 1; }
      100% { transform: translateX(150vw); opacity: 0; }  /* off the screen */
    }

    /* success celebration */
    .cat-img.happy {
      width: 270px; height: auto;
      animation: pop .5s ease both;
    }
    @keyframes pop {
      0%   { transform: scale(.6); opacity: 0; }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    .again {
      display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap;
    }
    .again input {
      width: 64px; text-align: center;
      padding: 9px 8px; border-radius: 10px; border: 1px solid #e6def5; font: inherit;
    }
    .again .lbl { color: #6a5f6a; font-size: 14px; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="moon"></div>
  <main>
    <div class="cat-stage">
      <img class="cat-img" id="catImg" src="sleeping-cat-zzz.gif" alt="A cat sleeping" />
    </div>
    <h1 id="title">Shhh… this site is napping</h1>
    <p id="subtitle">Your focus cat curled up here so you don't have to. 🐾</p>
    <p class="from" id="fromUrl"></p>
    <div class="countdown" id="countdown"></div>
    <div class="actions">
      <button id="stop" class="btn-stop">🐈 Stop focus &amp; let me in</button>
      <button id="back" class="btn-ghost">← Tiptoe back</button>
    </div>
    <div class="note" id="note"></div>
  </main>
  <script src="blocked.js"></script>
</body>
</html>
