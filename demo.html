<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Purrductivity — preview</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    body {
      width: auto; background: #2b2740; color: #efe7fb;
      min-height: 100vh; padding: 28px;
      display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; align-items: flex-start;
    }
    .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .col h3 { margin: 0; font-size: 14px; color: #c9b7ec; font-weight: 600; }
    iframe {
      width: 460px; height: 320px; border: 0; border-radius: 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,.4);
    }
    .popup-frame {
      position: relative; width: 320px; min-height: 360px;
      background: #fbf3ec; border-radius: 16px; padding: 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,.4); overflow: hidden;
    }
    .replay {
      padding: 9px 16px; border-radius: 12px; border: 0;
      background: #f0934a; color: #fff; font: inherit; font-weight: 600; cursor: pointer;
    }
    .replay:hover { background: #e07c2e; }
  </style>
</head>
<body>
  <div class="col">
    <h3>🚫 Blocked site → cat is sleeping</h3>
    <iframe src="blocked.html?from=https://reddit.com/r/all"></iframe>
  </div>

  <div class="col">
    <h3>🎉 Focus complete → happy cat + "Focus again?"</h3>
    <iframe src="blocked.html?celebrate=1&from=https://reddit.com/r/all"></iframe>
  </div>

  <div class="col">
    <h3>🏃 Quit focus early → cat runs away</h3>
    <div class="popup-frame" id="popupFrame">
      <header>
        <span class="logo">🐱</span>
        <h1>Purrductivity</h1>
      </header>
      <section class="status">
        <div class="dot active"></div>
        <div>
          <div class="label">Focus active</div>
          <div class="sub">Ends in 24:13</div>
        </div>
      </section>
      <p style="color:#8a7a6c;font-size:12px;">Click below to bail before the timer 👇</p>
      <button class="danger" id="quitBtn">Stop focus</button>

      <div class="runaway" id="runaway" aria-hidden="true">
        <div class="runaway-msg">Your cat ran off! 🐈‍⬛💨</div>
        <div class="runner">
          <img class="run-cat-img" src="orangcat-walkaway-pixelart.gif" alt="A cat walking away" />
        </div>
      </div>
    </div>
    <button class="replay" id="replay">↻ Replay run-away</button>
  </div>

  <script>
    function play() {
      const o = document.getElementById("runaway");
      o.classList.remove("show");
      void o.offsetWidth;
      o.classList.add("show");
      setTimeout(() => o.classList.remove("show"), 1750);
    }
    document.getElementById("quitBtn").addEventListener("click", play);
    document.getElementById("replay").addEventListener("click", play);
  </script>
</body>
</html>
